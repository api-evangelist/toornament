naftiko: 1.0.0-alpha2
info:
  label: Toornament API — Webhooks
  description: 'Toornament API — Webhooks. 2 operations. Lead operation: List Webhooks. Self-contained Naftiko capability
    covering one Toornament business surface.'
  tags:
  - Toornament
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOORNAMENT_API_KEY: TOORNAMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: toornament-webhooks
    baseUri: https://api.toornament.com/organizer/v2
    description: Toornament API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Api-Key
          in: header
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
          required: true
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Api-Key
          in: header
          type: string
          required: true
        - name: Authorization
          in: header
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TOORNAMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: toornament-webhooks-rest
    port: 8080
    description: REST adapter for Toornament API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: toornament-webhooks.listwebhooks
        with:
          X-Api-Key: rest.X-Api-Key
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: toornament-webhooks.createwebhook
        with:
          X-Api-Key: rest.X-Api-Key
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: toornament-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toornament API — Webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: toornament-webhooks.listwebhooks
      with:
        X-Api-Key: tools.X-Api-Key
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: toornament-webhooks.createwebhook
      with:
        X-Api-Key: tools.X-Api-Key
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
