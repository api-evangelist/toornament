naftiko: 1.0.0-alpha2
info:
  label: Toornament API — Disciplines
  description: 'Toornament API — Disciplines. 1 operations. Lead operation: List Disciplines. Self-contained Naftiko capability
    covering one Toornament business surface.'
  tags:
  - Toornament
  - Disciplines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOORNAMENT_API_KEY: TOORNAMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: toornament-disciplines
    baseUri: https://api.toornament.com/organizer/v2
    description: Toornament API — Disciplines business capability. Self-contained, no shared references.
    resources:
    - name: disciplines
      path: /disciplines
      operations:
      - name: listdisciplines
        method: GET
        description: List Disciplines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Api-Key
          in: header
          type: string
          required: true
        - name: Range
          in: header
          type: string
    authentication:
      type: bearer
      token: '{{env.TOORNAMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: toornament-disciplines-rest
    port: 8080
    description: REST adapter for Toornament API — Disciplines. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/disciplines
      name: disciplines
      description: REST surface for disciplines.
      operations:
      - method: GET
        name: listdisciplines
        description: List Disciplines
        call: toornament-disciplines.listdisciplines
        with:
          X-Api-Key: rest.X-Api-Key
          Range: rest.Range
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: toornament-disciplines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toornament API — Disciplines. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-disciplines
      description: List Disciplines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: toornament-disciplines.listdisciplines
      with:
        X-Api-Key: tools.X-Api-Key
        Range: tools.Range
      outputParameters:
      - type: object
        mapping: $.
