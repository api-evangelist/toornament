aid: toornament
name: Toornament
description: >-
  Toornament is an esports tournament management platform providing a
  comprehensive API for creating, managing, and viewing tournaments across
  100+ esports disciplines. The API supports full tournament lifecycle
  management including participant registration, bracket generation, match
  reporting, and real-time standings. Used by game publishers, esports
  organizers, broadcasters, and gaming communities worldwide.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Esports
  - Gaming
  - Tournaments
  - Brackets
  - Competition
created: '2025-02-06'
modified: '2026-05-03'
url: >-
  https://raw.githubusercontent.com/api-evangelist/toornament/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: toornament:organizer-api
    name: Toornament Organizer API
    description: >-
      Full-featured tournament management API for tournament organizers.
      Provides complete CRUD operations for tournaments, participant management,
      stage and bracket configuration, match reporting, registration management,
      and webhook subscriptions. Requires API key authentication plus OAuth2
      access tokens with organizer:view or organizer:admin scopes.
    humanURL: https://developer.toornament.com/v2/overview/get-started
    baseURL: https://api.toornament.com/organizer/v2
    tags:
      - Brackets
      - Esports
      - Gaming
      - Matches
      - Organizer
      - Participants
      - Tournaments
    properties:
      - type: Documentation
        url: https://developer.toornament.com/v2/overview/get-started
      - type: OpenAPI
        url: openapi/toornament-openapi.yml
      - type: SpectralRules
        url: rules/toornament-rules.yml
      - type: NaftikoCapability
        url: capabilities/shared/toornament-organizer.yaml
  - aid: toornament:viewer-api
    name: Toornament Viewer API
    description: >-
      Read-only public API for accessing tournament information without
      full organizer authentication. Ideal for embedding tournament brackets,
      leaderboards, and match schedules in applications, streaming overlays,
      and fan sites. Supports disciplines, tournaments, participants, stages,
      matches, and rankings.
    humanURL: https://developer.toornament.com/v2/doc/viewer_overview
    baseURL: https://api.toornament.com/viewer/v2
    tags:
      - Brackets
      - Esports
      - Gaming
      - Read-Only
      - Tournaments
      - Viewer
    properties:
      - type: Documentation
        url: https://developer.toornament.com/v2/doc/viewer_overview
